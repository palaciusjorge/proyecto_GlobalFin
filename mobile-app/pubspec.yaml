name: mobile_app
description: >
  Aplicación móvil GlobalFin para clientes (iOS/Android).
  Interfaz amigable con microinteracciones fluidas y accesibilidad integrada.
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.1
  equatable: ^2.0.5
  
  # Routing
  go_router: ^13.0.0
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Dependency Injection
  get_it: ^7.6.0
  
  # UI & Material Design
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  
  # Authentication
  flutter_secure_storage: ^9.0.0
  
  # Locale & Internationalization
  intl: ^0.19.0
  
  # Utilities
  logger: ^2.1.0
  freezed_annotation: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Testing
  mockito: ^5.4.4
  mocktail: ^1.0.0
  bloc_test: ^9.1.0
  
  # Code Generation
  build_runner: ^2.4.7
  freezed: ^2.4.5

  # Linting
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  # Fonts
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
